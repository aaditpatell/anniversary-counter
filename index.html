<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadit & Sin-kei</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lato:wght@400;700;900&family=Quicksand:wght@400;500;600;700&family=Shadows+Into+Light&display=swap" rel="stylesheet">
<style>
  :root {
    --brown: rgb(88, 57, 39);
    --brown-light: rgb(139, 100, 72);
    --brown-lighter: rgb(180, 142, 113);
    --brown-pale: rgb(210, 180, 158);
    --cream: #fdf6f0;
    --cream-warm: #f9ede2;
    --tan: #e8d5c4;
    --caramel: #c4956a;
    --toffee: #a67b5b;
    --honey: #d4a574;
    --latte: #c9b09a;
    --blush: #e6c4b0;
    --text: rgb(88, 57, 39);
    --text-light: rgb(139, 100, 72);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Quicksand', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: var(--text);
    position: relative;
  }

  .bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  /* hand-drawn hearts float gently across the background */
  .hand-heart {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    animation: heartDrift linear infinite;
    filter: saturate(0.7);
  }

  @keyframes heartDrift {
    0% { transform: translateY(0) rotate(var(--rot-start)) scale(0.9); opacity: 0; }
    8% { opacity: var(--heart-opacity); }
    85% { opacity: calc(var(--heart-opacity) * 0.5); }
    100% { transform: translateY(-110vh) rotate(var(--rot-end)) scale(1); opacity: 0; }
  }

  /* floating photos */
  .floating-photo {
    position: absolute;
    border-radius: 16px;
    border: 3px solid white;
    box-shadow: 0 4px 24px rgba(88,57,39,0.18), 0 2px 8px rgba(0,0,0,0.06);
    object-fit: cover;
    pointer-events: none;
    z-index: 0;
    will-change: transform, opacity;
    transition: none;
  }

  .floating-photo.deflecting {
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* sparkle dots */
  .sparkle {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: twinkle 2.5s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.12; transform: scale(0.8); }
    50% { opacity: 0.6; transform: scale(1.4); }
  }

  .main-card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.93);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 20px;
    padding: 40px 36px 32px;
    max-width: 480px;
    width: 88%;
    box-shadow: 0 8px 32px rgba(88,57,39,0.08);
    text-align: center;
    animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    border: 1px solid rgba(88,57,39,0.06);
  }

  @keyframes cardIn {
    0% { opacity: 0; transform: translateY(40px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .top-deco {
    font-family: 'Shadows Into Light', cursive;
    font-size: 1.05rem;
    color: var(--brown-light);
    margin-bottom: 2px;
    animation: fadeUp 0.6s 0.2s ease both;
    letter-spacing: 1px;
  }

  @keyframes bounceIn {
    0% { opacity: 0; transform: scale(0); }
    100% { opacity: 1; transform: scale(1); }
  }

  .title {
    font-family: 'Lato', sans-serif;
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--brown);
    margin-bottom: 2px;
    animation: fadeUp 0.6s 0.4s ease both;
    line-height: 1.2;
  }

  .subtitle {
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    color: var(--text-light);
    margin-bottom: 28px;
    font-weight: 500;
    animation: fadeUp 0.6s 0.5s ease both;
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .countdown-unit {
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .countdown-unit:nth-child(1) { animation-delay: 0.6s; }
  .countdown-unit:nth-child(2) { animation-delay: 0.7s; }
  .countdown-unit:nth-child(3) { animation-delay: 0.8s; }
  .countdown-unit:nth-child(4) { animation-delay: 0.9s; }

  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1); }
  }

  .countdown-bubble {
    border-radius: 14px;
    padding: 14px 8px 10px;
    transition: transform 0.2s ease;
  }

  .countdown-bubble:hover {
    transform: scale(1.04);
  }

  .countdown-number {
    font-family: 'Lato', sans-serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: white;
    line-height: 1;
    transition: transform 0.2s ease;
  }

  .countdown-label {
    font-family: 'Lato', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  .c1 { background: rgb(88,57,39); }
  .c2 { background: var(--toffee); }
  .c3 { background: var(--caramel); }
  .c4 { background: var(--honey); }

  .message-area {
    background: var(--cream-warm);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 20px;
    border: 1px solid rgba(88,57,39,0.08);
    animation: fadeUp 0.6s 1s ease both;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .message-text {
    font-family: 'Shadows Into Light', cursive;
    font-size: 1.3rem;
    color: var(--brown);
    font-weight: 400;
    line-height: 1.4;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .progress-section {
    animation: fadeUp 0.6s 1.1s ease both;
  }

  .progress-label {
    font-size: 0.8rem;
    color: var(--text-light);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .progress-bar-bg {
    background: var(--tan);
    border-radius: 8px;
    height: 8px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 8px;
    background: var(--brown);
    transition: width 1s ease;
  }

  .celebration {
    font-family: 'Caveat', cursive;
    font-size: 2rem;
    color: var(--brown);
    animation: pulse 1.5s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .days-together {
    font-size: 0.85rem;
    color: var(--text-light);
    margin-top: 14px;
    font-weight: 500;
    animation: fadeUp 0.6s 1.2s ease both;
  }

  .days-together span {
    color: var(--brown);
    font-weight: 700;
    font-size: 1rem;
  }

  @media (max-width: 480px) {
    .main-card { padding: 28px 20px 24px; }
    .title { font-size: 2rem; }
    .countdown-number { font-size: 1.6rem; }
    .countdown-grid { gap: 8px; }
    .countdown-bubble { padding: 10px 6px 8px; border-radius: 10px; }
  }
</style>
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>
<div id="sparkles"></div>

<div class="main-card">
  <div class="top-deco">for mister sin-kei</div>
  <div class="title">Aadit & Sin-kei</div>
  <div class="subtitle">Counting down to July 18, 2026</div>

  <div class="countdown-grid">
    <div class="countdown-unit">
      <div class="countdown-bubble c1">
        <div class="countdown-number" id="days">--</div>
        <div class="countdown-label">Days</div>
      </div>
    </div>
    <div class="countdown-unit">
      <div class="countdown-bubble c2">
        <div class="countdown-number" id="hours">--</div>
        <div class="countdown-label">Hours</div>
      </div>
    </div>
    <div class="countdown-unit">
      <div class="countdown-bubble c3">
        <div class="countdown-number" id="mins">--</div>
        <div class="countdown-label">Mins</div>
      </div>
    </div>
    <div class="countdown-unit">
      <div class="countdown-bubble c4">
        <div class="countdown-number" id="secs">--</div>
        <div class="countdown-label">Secs</div>
      </div>
    </div>
  </div>

  <div class="message-area">
    <div class="message-text" id="messageText"></div>
  </div>

  <div class="progress-section">
    <div class="progress-label" id="progressLabel"></div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <div class="days-together" id="daysTogether"></div>
</div>

  let messageIndex = 0;

  function createHearts() {
    const bg = document.getElementById('bgLayer');
    const count = 12;

    for (let i = 0; i < count; i++) {
      const img = document.createElement('img');
      img.src = heartImages[i % heartImages.length];
      img.className = 'hand-heart';
      const size = 40 + Math.random() * 45; // 40-85px
      img.style.width = size + 'px';
      img.style.height = 'auto';
      img.style.left = (3 + Math.random() * 90) + '%';
      img.style.bottom = '-100px';

      const rotStart = -25 + Math.random() * 50;
      const rotEnd = rotStart + (-30 + Math.random() * 60);
      const opacity = 0.15 + Math.random() * 0.15; // 0.15-0.30

      img.style.setProperty('--rot-start', rotStart + 'deg');
      img.style.setProperty('--rot-end', rotEnd + 'deg');
      img.style.setProperty('--heart-opacity', opacity);

      img.style.animationDuration = (16 + Math.random() * 18) + 's';
      img.style.animationDelay = (i * 2.5 + Math.random() * 3) + 's';

      bg.appendChild(img);
    }
  }

  function createPhotos() {
    // Photos are now driven by JS physics in animatePhotos()
    const bg = document.getElementById('bgLayer');
    const sizes = [115, 125, 135, 145];
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Stagger launch times so photos don't bunch
    const baseInterval = 3.5; // seconds between each photo launch

    photos.forEach((src, i) => {
      const img = document.createElement('img');
      img.className = 'floating-photo';
      img.src = src;
      const size = sizes[i % sizes.length];
      img.style.width = size + 'px';
      img.style.height = size + 'px';
      img.style.opacity = '0';

      // Start in a central-ish zone (20%-80% of screen width)
      const startX = 0.2 * vw + Math.random() * 0.6 * vw - size / 2;
      img.style.left = startX + 'px';
      img.style.top = (vh + 20) + 'px';

      bg.appendChild(img);

      // Store physics state on the element
      img._phys = {
        x: startX,
        y: vh + 20,
        baseX: startX,
        xOffset: 0, // deflection offset
        size: size,
        speed: 0.95 + Math.random() * 0.5, // px per frame (~60fps)
        rotation: -4 + Math.random() * 8,
        rotSpeed: 0.02 + Math.random() * 0.03,
        delay: i * baseInterval * 60, // frames to wait before launching
        launched: false,
        deflected: false,
        deflectDir: 0, // -1 left, +1 right
        opacity: 0,
        phase: Math.random() * Math.PI * 2, // for gentle horizontal sway
      };
    });

    // Start the physics loop
    requestAnimationFrame(animatePhotos);
  }

  let frameCount = 0;

  function animatePhotos() {
    frameCount++;
    const bg = document.getElementById('bgLayer');
    const card = document.querySelector('.main-card');
    const cardRect = card.getBoundingClientRect();
    const vh = window.innerHeight;
    const vw = window.innerWidth;
    const padding = 24;

    // Card zone with padding
    const cardTop = cardRect.top - padding;
    const cardBottom = cardRect.bottom + padding;
    const cardLeft = cardRect.left - padding;
    const cardRight = cardRect.right + padding;

    const allPhotos = bg.querySelectorAll('.floating-photo');
    const activePhotos = []; // track positions for overlap checks

    allPhotos.forEach((img) => {
      const p = img._phys;
      if (!p) return;

      // Wait for launch delay
      if (!p.launched) {
        if (frameCount >= p.delay) {
          p.launched = true;
          p.y = vh + 20;
        } else {
          return;
        }
      }

      // Move upward — fast at bottom, slow at top
      const normalizedY = 1 - (p.y / vh); // 0 at bottom, 1 at top
      const speedMultiplier = Math.max(0.3, 1.8 - normalizedY * 1.5);
      p.y -= p.speed * speedMultiplier;

      // Gentle horizontal sway
      const sway = Math.sin(frameCount * 0.008 + p.phase) * 0.3;
      p.rotation += p.rotSpeed;

      // Fade in quickly, fade out slowly at top
      if (p.y > vh - 80) {
        p.opacity = Math.min(1, (vh + 20 - p.y) / 100);
      } else if (p.y < vh * 0.15) {
        p.opacity = Math.max(0, p.y / (vh * 0.15));
      } else {
        p.opacity = Math.min(p.opacity + 0.03, 0.9);
      }

      // Check card collision
      const imgCenterX = p.baseX + p.xOffset + p.size / 2;
      const imgTop = p.y;
      const imgBottom = p.y + p.size;

      const overlapsVertically = imgBottom > cardTop && imgTop < cardBottom;
      const overlapsHorizontally = (imgCenterX + p.size / 2) > cardLeft && (imgCenterX - p.size / 2) < cardRight;

      if (overlapsVertically && overlapsHorizontally && !p.deflected) {
        p.deflected = true;
        // Decide which side to push to based on which edge is closer
        if (imgCenterX < (cardLeft + cardRight) / 2) {
          // Push left
          p.deflectDir = -1;
          p.xOffset = cardLeft - p.baseX - p.size - 10;
        } else {
          // Push right
          p.deflectDir = 1;
          p.xOffset = cardRight - p.baseX + 10;
        }
        img.classList.add('deflecting');
        // Remove the transition class after animation completes
        setTimeout(() => img.classList.remove('deflecting'), 600);
      }

      // Once past the card, gently drift back toward center (optional: keep offset)
      if (p.deflected && imgBottom < cardTop - 30) {
        // Stay deflected but can drift slightly
      }

      // Check overlap with other active photos — push apart if more than corners overlap
      const myRect = {
        x: p.baseX + p.xOffset + sway,
        y: p.y,
        w: p.size,
        h: p.size,
      };

      for (const other of activePhotos) {
        const overlapX = Math.min(myRect.x + myRect.w, other.x + other.w) - Math.max(myRect.x, other.x);
        const overlapY = Math.min(myRect.y + myRect.h, other.y + other.h) - Math.max(myRect.y, other.y);

        if (overlapX > myRect.w * 0.25 && overlapY > myRect.h * 0.25) {
          // More than corner overlap — nudge horizontally
          if (myRect.x < other.x) {
            p.xOffset -= 1.5;
          } else {
            p.xOffset += 1.5;
          }
        }
      }

      // Clamp to screen bounds
      const finalX = Math.max(5, Math.min(vw - p.size - 5, p.baseX + p.xOffset + sway));

      // Apply position
      img.style.left = finalX + 'px';
      img.style.top = p.y + 'px';
      img.style.opacity = p.opacity;
      img.style.transform = `rotate(${Math.sin(p.rotation) * 6}deg) scale(${0.85 + normalizedY * 0.1})`;

      activePhotos.push(myRect);

      // Reset when off screen
      if (p.y < -p.size - 20) {
        p.y = vh + 20 + Math.random() * 100;
        p.baseX = 0.2 * vw + Math.random() * 0.6 * vw - p.size / 2;
        p.xOffset = 0;
        p.deflected = false;
        p.opacity = 0;
        p.phase = Math.random() * Math.PI * 2;
        img.classList.remove('deflecting');
      }
    });

    requestAnimationFrame(animatePhotos);
  }

  function createSparkles() {
    const container = document.getElementById('sparkles');
    const colors = ['rgba(88,57,39,0.12)', 'rgba(196,149,106,0.18)', 'rgba(212,165,116,0.15)'];
    for (let i = 0; i < 8; i++) {
      const dot = document.createElement('div');
      dot.className = 'sparkle';
      dot.style.left = Math.random() * 100 + '%';
      dot.style.top = Math.random() * 100 + '%';
      dot.style.animationDelay = (Math.random() * 3) + 's';
      dot.style.width = dot.style.height = (3 + Math.random() * 3) + 'px';
      dot.style.background = colors[Math.floor(Math.random() * colors.length)];
      container.appendChild(dot);
    }
  }

  function updateCountdown() {
    const now = new Date();
    const diff = ANNIVERSARY - now;

    if (diff <= 0) {
      document.getElementById('days').textContent = '0';
      document.getElementById('hours').textContent = '0';
      document.getElementById('mins').textContent = '0';
      document.getElementById('secs').textContent = '0';
      document.getElementById('messageText').innerHTML = '<span class="celebration">Happy Anniversary! 🎉🌳🥂</span>';
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressLabel').textContent = "It's here!";
      return;
    }

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    animateNum('days', d);
    animateNum('hours', h);
    animateNum('mins', m);
    animateNum('secs', s);

    const total = ANNIVERSARY - START_DATE;
    const elapsed = now - START_DATE;
    const pct = Math.min(100, Math.max(0, (elapsed / total) * 100));
    document.getElementById('progressFill').style.width = pct.toFixed(1) + '%';
    document.getElementById('progressLabel').textContent = Math.round(pct) + '% of the way to our 1 year!';

    const daysTogether = Math.floor((now - START_DATE) / (1000 * 60 * 60 * 24));
    document.getElementById('daysTogether').innerHTML = '<span>' + daysTogether + '</span> days together and counting';
  }

  function animateNum(id, val) {
    const el = document.getElementById(id);
    if (el.textContent !== String(val)) {
      el.style.transform = 'scale(1.2)';
      el.textContent = val;
      setTimeout(() => el.style.transform = 'scale(1)', 180);
    }
  }

  function rotateMessages() {
    const el = document.getElementById('messageText');
    el.style.opacity = '0';
    el.style.transform = 'translateY(8px)';
    setTimeout(() => {
      el.textContent = messages[messageIndex % messages.length];
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
      messageIndex++;
    }, 400);
  }

  createHearts();
  createPhotos();
  createSparkles();
  updateCountdown();
  setInterval(updateCountdown, 1000);
  rotateMessages();
  setInterval(rotateMessages, 5000);
</script>
</body>
